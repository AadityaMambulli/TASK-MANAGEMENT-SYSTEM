<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Task Management System</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <h1>📋 Task Manager</h1>
    <p>Manage your tasks efficiently</p>
  </header>

  <main>
    <!-- Add Task Form -->
    <section class="form-section">
      <h2>Add New Task</h2>
      <div class="form-group">
        <input type="text" id="taskTitle" placeholder="Task title..." />
      </div>
      <div class="form-group">
        <textarea id="taskDesc" placeholder="Description (optional)..."></textarea>
      </div>
      <div class="form-group">
        <select id="taskPriority">
          <option value="low">🟢 Low Priority</option>
          <option value="medium" selected>🟡 Medium Priority</option>
          <option value="high">🔴 High Priority</option>
        </select>
      </div>
      <button id="addTaskBtn" onclick="createTask()">+ Add Task</button>
    </section>

    <!-- Filter Bar -->
    <section class="filter-section">
      <button class="filter-btn active" onclick="filterTasks('all')">All</button>
      <button class="filter-btn" onclick="filterTasks('pending')">Pending</button>
      <button class="filter-btn" onclick="filterTasks('in-progress')">In Progress</button>
      <button class="filter-btn" onclick="filterTasks('completed')">Completed</button>
    </section>

    <!-- Task List -->
    <section class="tasks-section">
      <div id="taskList" class="task-grid">
        <p class="loading">Loading tasks...</p>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
